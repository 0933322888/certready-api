<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="420" height="260" role="img" aria-labelledby="ht">
  <title id="ht">Side view of head with haircutting reference points</title>
  <rect width="420" height="260" fill="#FAF7F2" rx="10"/>
  <style><![CDATA[
    .t { font: 600 12px system-ui, Segoe UI, sans-serif; fill: #0f172a; }
    .h { font: 11px system-ui, Segoe UI, sans-serif; fill: #334155; }
  ]]></style>
  <!-- Head silhouette (profile) -->
  <path d="M120 210 C95 200 85 165 92 130 C98 85 145 48 195 45 C245 42 285 70 298 115 C305 145 295 175 275 195 L265 210 L120 210 Z" fill="#e8dcc8" stroke="#8b7355" stroke-width="2"/>
  <!-- Nape -->
  <circle cx="118" cy="198" r="4" fill="#c2410c"/>
  <text x="125" y="202" class="t">Nape</text>
  <!-- Occipital -->
  <circle cx="95" cy="150" r="4" fill="#c2410c"/>
  <text x="18" y="154" class="t">Occipital bone</text>
  <!-- Parietal ridge (widest) -->
  <circle cx="268" cy="118" r="4" fill="#c2410c"/>
  <text x="276" y="112" class="t">Parietal ridge</text>
  <text x="276" y="126" class="h">(widest point)</text>
  <!-- Crown -->
  <circle cx="218" cy="62" r="4" fill="#c2410c"/>
  <text x="228" y="58" class="t">Crown / apex</text>
  <!-- Temporal -->
  <circle cx="248" cy="168" r="4" fill="#c2410c"/>
  <text x="256" y="180" class="t">Temporal</text>
  <text x="200" y="248" class="h" text-anchor="middle">Schematic profile - not to scale.</text>
</svg>
