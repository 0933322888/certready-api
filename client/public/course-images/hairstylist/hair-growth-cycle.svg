<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200" role="img" aria-labelledby="gt">
  <title id="gt">Hair growth cycle: anagen, catagen, telogen</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="520" height="200" fill="#FAF7F2" rx="10"/>
  <style><![CDATA[
    .b { font: 700 13px system-ui, Segoe UI, sans-serif; fill: #0f172a; }
    .s { font: 11px system-ui, Segoe UI, sans-serif; fill: #334155; }
  ]]></style>
  <rect x="20" y="40" width="140" height="100" fill="#fff" stroke="#64748b" stroke-width="1.5" rx="6"/>
  <text x="90" y="68" text-anchor="middle" class="b">Anagen</text>
  <text x="90" y="88" text-anchor="middle" class="s">Growth</text>
  <text x="90" y="108" text-anchor="middle" class="s">~85-90%</text>
  <text x="90" y="128" text-anchor="middle" class="s">2-7 years</text>
  <path d="M165 90 L185 90" stroke="#0f172a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="190" y="40" width="140" height="100" fill="#fff" stroke="#64748b" stroke-width="1.5" rx="6"/>
  <text x="260" y="68" text-anchor="middle" class="b">Catagen</text>
  <text x="260" y="88" text-anchor="middle" class="s">Transition</text>
  <text x="260" y="108" text-anchor="middle" class="s">~1-2%</text>
  <text x="260" y="128" text-anchor="middle" class="s">2-3 weeks</text>
  <path d="M335 90 L355 90" stroke="#0f172a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="360" y="40" width="140" height="100" fill="#fff" stroke="#64748b" stroke-width="1.5" rx="6"/>
  <text x="430" y="68" text-anchor="middle" class="b">Telogen</text>
  <text x="430" y="88" text-anchor="middle" class="s">Rest / shed</text>
  <text x="430" y="108" text-anchor="middle" class="s">~10-15%</text>
  <text x="430" y="128" text-anchor="middle" class="s">3-4 months</text>
  <text x="260" y="188" text-anchor="middle" class="s">Cycle repeats; new anagen hair pushes out old telogen hair.</text>
</svg>
