<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" role="img" aria-labelledby="t d">
  <title id="t">Hair shaft cross-section (schematic)</title>
  <desc id="d">Simplified diagram: overlapping cuticle scales around the cortex, with central medulla.</desc>
  <defs>
    <style><![CDATA[
      .label { font: 600 13px system-ui, Segoe UI, sans-serif; fill: #0f172a; }
      .hint { font: 11px system-ui, Segoe UI, sans-serif; fill: #334155; }
    ]]></style>
  </defs>
  <!-- Opaque light panel so labels stay readable on dark UI backgrounds (SVG is used as <img>) -->
  <rect width="400" height="220" fill="#FAF7F2" rx="10"/>
  <!-- Hair strand (longitudinal cut-away) -->
  <ellipse cx="200" cy="110" rx="140" ry="48" fill="#c4a574" stroke="#5c4a32" stroke-width="2"/>
  <!-- Medulla -->
  <ellipse cx="200" cy="110" rx="28" ry="18" fill="#e8dcc8" stroke="#8b7355" stroke-width="1.5"/>
  <!-- Cortex ring (visual band) -->
  <ellipse cx="200" cy="110" rx="95" ry="38" fill="none" stroke="#6b5344" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <!-- Cuticle scales (exaggerated) -->
  <g stroke="#3d5a4a" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M75 95c8-6 18-4 24 2M72 108c10-8 22-5 30 2M75 121c8-6 18-4 24 2"/>
    <path d="M325 95c-8-6-18-4-24 2M328 108c-10-8-22-5-30 2M325 121c-8-6-18-4-24 2"/>
    <path d="M115 72c4 10 2 20-2 26M200 62c0 12-2 22-6 28M285 72c-4 10-2 20 2 26"/>
    <path d="M115 148c4-10 2-20-2-26M200 158c0-12-2-22-6-28M285 148c-4-10-2-20 2-26"/>
  </g>
  <text x="200" y="52" text-anchor="middle" class="label">Cuticle</text>
  <text x="200" y="112" text-anchor="middle" class="label">Medulla</text>
  <text x="200" y="88" text-anchor="middle" class="label">Cortex</text>
  <text x="200" y="200" text-anchor="middle" class="label">Overlapping scales (exaggerated)</text>
  <text x="200" y="214" text-anchor="middle" class="hint">Educational schematic - not to scale.</text>
</svg>
