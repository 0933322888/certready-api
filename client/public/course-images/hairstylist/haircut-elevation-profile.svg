<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 278" width="400" height="278" role="img" aria-labelledby="et">
  <title id="et">Hair elevation: 0 degrees natural fall along the scalp, 90 degrees straight out from the head, 45 degrees between</title>
  <rect width="400" height="278" fill="#FAF7F2" rx="10"/>
  <style><![CDATA[
    .lbl { font: 600 12px system-ui, Segoe UI, sans-serif; fill: #0f172a; }
    .note { font: 11px system-ui, Segoe UI, sans-serif; fill: #334155; }
  ]]></style>
  <!-- Diagram area (unchanged geometry, slightly tighter) -->
  <ellipse cx="115" cy="108" rx="48" ry="72" fill="#e8dcc8" stroke="#8b7355" stroke-width="2"/>
  <circle cx="157" cy="73" r="5" fill="#1e293b"/>
  <line x1="157" y1="73" x2="202" y2="36" stroke="#c2410c" stroke-width="3" stroke-linecap="round"/>
  <text x="206" y="40" class="lbl">90 (out from head)</text>
  <line x1="157" y1="73" x2="185" y2="148" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  <text x="188" y="162" class="lbl">0 (natural fall)</text>
  <line x1="157" y1="73" x2="215" y2="89" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
  <text x="218" y="102" class="lbl">45</text>
  <!-- Notes: centered, short lines so nothing clips inside viewBox -->
  <text x="200" y="198" text-anchor="middle" class="note">0° = along scalp / natural fall (no lift).</text>
  <text x="200" y="214" text-anchor="middle" class="note">90° = straight out; 45° = halfway between.</text>
  <text x="200" y="230" text-anchor="middle" class="note">Higher lift moves weight up; 0° keeps</text>
  <text x="200" y="246" text-anchor="middle" class="note">weight at the perimeter.</text>
  <text x="200" y="266" text-anchor="middle" class="note">Educational schematic - not to scale.</text>
</svg>
